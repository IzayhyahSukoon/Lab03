<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="description" content="CWA Help Desk Appointment booking page">
    <meta name="keywords" content="CWA, Help Desk, Appointment, Support">
    <meta name="author" content="Your Name">
    <title>CWA Help Desk Appointment</title>
</head>
<body>
    <!-- Logo as hyperlink -->
    <header>
        <a href="http://www.swin.edu.au">
            <img src="images/logo.png" alt="Swinburne University Logo" style="width:150px; display:block; margin:0 auto;">
        </a>
        <h1>CWA Help Desk Appointment</h1>
        <p>The Help Desk is located in ATC620. Open 10:30 to 19:00 Monday to Friday.</p>
        <p>Check Blackboard for when CWA tutors will be there.</p>
    </header>

    <form action="submit_form.php" method="post">
        <!-- Student Details -->
        <fieldset>
            <legend>Student Details</legend>

            <label for="studentid">Student ID:</label>
            <input type="text" id="studentid" name="studentid" required 
                   pattern="\d{7,10}" placeholder="7–10 digits"><br><br>

            <label for="givenname">Given Name:</label>
            <input type="text" id="givenname" name="givenname" required 
                   maxlength="15" pattern="[A-Za-z]+" placeholder="First name"><br><br>

            <label for="familyname">Family Name:</label>
            <input type="text" id="familyname" name="familyname" required 
                   maxlength="15" pattern="[A-Za-z]+" placeholder="Last name"><br><br>
        </fieldset>

        <!-- Unit + Tutor together -->
        <fieldset>
            <legend>Your Unit</legend>
            
            <p>Select your unit:</p>
            <label><input type="checkbox" name="unit[]" value="COS10011"> COS10011</label>
            <label><input type="checkbox" name="unit[]" value="COS60004"> COS60004</label>
            <label><input type="checkbox" name="unit[]" value="COS60007"> COS60007</label>
            <br><br>

            <label for="tutor">Your Tutor:</label>
            <select id="tutor" name="tutor" required>
                <option value="">Please Select</option>
                <option value="Tutor1">Tutor 1</option>
                <option value="Tutor2">Tutor 2</option>
                <option value="Tutor3">Tutor 3</option>
            </select>
        </fieldset>

        <!-- Issue + Description together -->
        <fieldset>
            <legend>Issue</legend>
            
            <p>Select the issue:</p>
            <label><input type="checkbox" name="issue[]" value="HTML" checked="checked"> HTML</label>
            <label><input type="checkbox" name="issue[]" value="CSS"> CSS</label>
            <label><input type="checkbox" name="issue[]" value="JavaScript"> JavaScript</label>
            <label><input type="checkbox" name="issue[]" value="PHP"> PHP</label>
            <label><input type="checkbox" name="issue[]" value="MySQL"> MySQL</label>
            <br><br>

            <label for="description">Description of Issue:</label><br>
            <textarea id="description" name="description" rows="4" cols="40" 
                      placeholder="Write description of your problem here..." required></textarea>
        </fieldset>

        <!-- Date and Time -->
        <fieldset>
            <legend>Preferred Date / Time</legend>
            <label for="date">Date:</label>
            <input type="text" id="date" name="date" required 
                   pattern="\d{2}/\d{2}/\d{4}" placeholder="dd/mm/yyyy"><br><br>

            <label for="time">Time:</label>
            <input type="text" id="time" name="time" required 
                   pattern="([01]?[0-9]|2[0-3]):[0-5][0-9]" placeholder="00:00">
        </fieldset>

        <br>
        <input type="submit" value="Book">
        <input type="reset" value="Reset form">
    </form>
</body>
</html>
